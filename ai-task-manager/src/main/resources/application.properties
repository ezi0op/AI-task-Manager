spring.application.name=ai-task-manager

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aitask}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:amit}

# MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

aitaskadmin

amit@110

# Server Port
server.port=8080

# Logging
logging.file.name=logs/ai-task-manager.log
logging.level.org.springframework=INFO
logging.level.com.annasaheb.aitaskmanager=DEBUG

#AI Configuration

spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://openrouter.ai/api}
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}

# Model
spring.ai.openai.chat.options.model=openai/gpt-4o-mini

# Optional
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=500